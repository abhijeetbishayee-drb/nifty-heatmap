name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev build-essential
        pip install buildozer==1.5.0 cython==0.29.33
    - name: Build APK
      run: |
        yes | buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: nifty-heatmap-apk
        path: bin/*.apk
