name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev build-essential
          pip install buildozer==1.5.0 cython==0.29.33
      - name: Setup NDK r25b
        run: |
          mkdir -p ~/.buildozer/android/platform
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip -d ~/.buildozer/android/platform/
      - name: Build APK
        run: |
          unset ANDROIDNDK
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          export ANDROIDNDK=$HOME/.buildozer/android/platform/android-ndk-r25b
          cd $GITHUB_WORKSPACE
          yes | buildozer android debug 2>&1
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nifty-heatmap-apk
          path: bin/*.apk
