name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
  uses: actions/setup-java@v3
  with:
    java-version: '17'
    distribution: 'temurin'
    
    - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf automake libtool autopoint gettext pkg-config zlib1g-dev libffi-dev libssl-dev build-essential libltdl-dev cmake m4
          pip install buildozer==1.5.0 cython==0.29.33
      - name: Setup NDK r25b
        run: |
          mkdir -p /home/runner/.buildozer/android/platform
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip -d /home/runner/.buildozer/android/platform/
      - name: Build APK
        run: |
          unset ANDROIDNDK ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT ANDROID_NDK_LATEST_HOME
          cd $GITHUB_WORKSPACE
          yes | buildozer android debug 2>&1 | tee build.log || true
          grep -i "error\\|ERROR\\|failed\\|assert" build.log | grep -v "^#" | grep -v "warn" | tail -50
          exit $(tail -1 build.log | grep -c "exit code 0" || echo 1)
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nifty-heatmap-apk
          path: bin/*.apk
